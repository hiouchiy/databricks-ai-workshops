bundle:
  name: retail_grocery_ltm_memory

resources:
  apps:
    retail_grocery_ltm_memory:
      name: "freshmart-agent-hiroshi"
      description: "Retail grocery conversational agent with Genie, Vector Search, and long-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app", "--no-ui"]
        env:
          # MLflow
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: MLFLOW_EXPERIMENT_ID
            value: "2019445883421300"
          # App config
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          # Lakebase
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "hiroshi-fresh-mart-lakebase"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "hiroshi-fresh-mart-lakebase-branch"
          # Genie
          - name: GENIE_SPACE_ID
            value: "01f1329294f010a6815eda19b72a9f1e"
          # Vector Search
          - name: VECTOR_SEARCH_INDEX
            value: "hiroshi.retail_agent.policy_docs_index"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/retail_grocery_ltm_memory/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/retail_grocery_ltm_memory/${bundle.target}
    resources:
      apps:
        retail_grocery_ltm_memory:
          name: freshmart-agent-hiroshi
          source_code_path: ./
