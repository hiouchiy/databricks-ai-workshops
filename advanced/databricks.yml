bundle:
  name: retail_grocery_ltm_memory

resources:
  apps:
    retail_grocery_ltm_memory:
      name: "freshmart-agent-hiroshi-v2"
      description: "フレッシュマート食品スーパー AI エージェント（Genie、Vector Search、長期メモリ）"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          # Lakebase: CLI v0.297 でもアプリの postgres リソースバインディングが未対応
          # （branch_id / database_name が unknown field として無視される）
          # SP への Lakebase 権限は grant_lakebase_permissions.py で手動付与
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "hiroshi-fresh-mart-lakebase"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "hiroshi-fresh-mart-lakebase-branch"
          - name: GENIE_SPACE_ID
            value_from: "retail_grocery_genie"
          - name: VECTOR_SEARCH_INDEX
            value_from: "policy_docs_index"
      resources:
        - name: "experiment"
          experiment:
            experiment_id: "2019445883421300"
            permission: "CAN_MANAGE"
        - name: "retail_grocery_genie"
          genie_space:
            name: "フレッシュマート 小売データ"
            space_id: "01f1329294f010a6815eda19b72a9f1e"
            permission: "CAN_RUN"
        - name: "policy_docs_index"
          uc_securable:
            securable_full_name: "hiroshi.retail_agent.policy_docs_index"
            securable_type: "TABLE"
            permission: "SELECT"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/retail_grocery_ltm_memory/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/retail_grocery_ltm_memory/${bundle.target}
    resources:
      apps:
        retail_grocery_ltm_memory:
          name: freshmart-agent-hiroshi-v2
          source_code_path: ./
